<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿胖團購</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-active { overflow: hidden; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

<header class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
        <h1 class="text-xl font-black text-red-600">阿胖團購</h1>
        <div class="flex items-center gap-4">
            <button onclick="openNameModal()" class="text-sm font-bold text-gray-600 bg-gray-100 px-3 py-1 rounded-full hover:bg-gray-200">
                👤 <span id="display-name">尚未設定姓名</span>
            </button>
            <button onclick="toggleCart()" class="relative text-gray-600 hover:text-red-500 transition">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="header-cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
            </button>
            <button onclick="reqAuth('login')" id="btn-admin-login" class="text-gray-400 hover:text-gray-800 transition"><i class="fas fa-cog"></i></button>
        </div>
    </div>
</header>

<div class="bg-red-50 text-red-600 text-sm font-bold py-2 overflow-hidden whitespace-nowrap">
    <div class="animate-[marquee_15s_linear_infinite] inline-block" id="marquee-text">歡迎光臨阿胖團購！</div>
</div>

<main class="max-w-4xl mx-auto p-4 mb-20">
    <div id="view-client" class="block">
        <div id="client-menu-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <div id="view-admin" class="hidden">
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 border-b">
            <button onclick="switchAdminTab('orders')" class="admin-tab active bg-gray-800 text-white px-4 py-2 rounded-lg font-bold whitespace-nowrap">待辦訂單</button>
            <button onclick="switchAdminTab('history')" class="admin-tab bg-white text-gray-600 border px-4 py-2 rounded-lg font-bold whitespace-nowrap hover:bg-gray-50">歷史紀錄</button>
            <button onclick="switchAdminTab('menu')" class="admin-tab bg-white text-gray-600 border px-4 py-2 rounded-lg font-bold whitespace-nowrap hover:bg-gray-50">菜單管理</button>
            <button onclick="adminLogout()" class="bg-red-50 text-red-500 border border-red-100 px-4 py-2 rounded-lg font-bold whitespace-nowrap hover:bg-red-100 ml-auto">登出</button>
        </div>

        <div id="admin-tab-orders" class="block">
            <div id="admin-status" class="text-center font-bold text-gray-500 mb-4">讀取中...</div>
            <div id="admin-orders-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="admin-tab-history" class="hidden">
            <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                    <select id="hist-filter-date" onchange="applyHistoryFilters()" class="border p-2 rounded-lg bg-gray-50"></select>
                    <select id="hist-filter-name" onchange="applyHistoryFilters()" class="border p-2 rounded-lg bg-gray-50"></select>
                    <select id="hist-filter-item" onchange="applyHistoryFilters()" class="border p-2 rounded-lg bg-gray-50"></select>
                </div>
                <div class="flex justify-between items-center mb-2">
                    <div class="font-bold text-gray-700">總計數量: <span id="hist-total-qty" class="text-red-500">0</span> / 總計金額: <span id="hist-total-amt" class="text-red-500">$0</span></div>
                    <div class="flex gap-2">
                        <button onclick="triggerDeleteSelected()" class="bg-red-500 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow hover:bg-red-600">刪除所選</button>
                        <button onclick="triggerDeleteAllOrders()" class="bg-gray-800 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow hover:bg-gray-900">清空全部</button>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 text-gray-500 font-bold border-b">
                        <tr>
                            <th class="px-4 py-3 text-center"><input type="checkbox" id="select-all-history" onchange="toggleAllHistoryRows()" class="w-4 h-4 text-red-600 rounded"></th>
                            <th class="px-4 py-3">時間</th>
                            <th class="px-4 py-3">姓名</th>
                            <th class="px-4 py-3">品項</th>
                            <th class="px-4 py-3">數量</th>
                            <th class="px-4 py-3">小計</th>
                            <th class="px-4 py-3 text-center">狀態 / 操作</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody" class="divide-y text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div id="admin-tab-menu" class="hidden">
            <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border flex flex-col gap-2">
                <h3 class="font-bold text-gray-800"><i class="fas fa-bullhorn text-yellow-500 mr-2"></i>公告設定 (顯示於跑馬燈)</h3>
                <div class="flex gap-2">
                    <input type="text" id="admin-announcement-input" class="flex-1 border border-gray-200 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="請輸入跑馬燈公告內容...">
                    <button onclick="triggerSaveAnnouncement()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg font-bold shadow transition whitespace-nowrap">儲存公告</button>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-black text-gray-800">商品列表</h2>
                <button onclick="openMenuModal('add')" class="bg-green-500 text-white px-4 py-2 rounded-lg font-bold shadow hover:bg-green-600"><i class="fas fa-plus mr-1"></i>新增品項</button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 text-gray-500 font-bold border-b">
                        <tr>
                            <th class="px-4 py-3">分類</th>
                            <th class="px-4 py-3">名稱</th>
                            <th class="px-4 py-3">價格</th>
                            <th class="px-4 py-3 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="admin-menu-tbody" class="divide-y text-gray-700"></tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/50 z-40 hidden transition-opacity"></div>
<div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-4 border-b flex justify-between items-center bg-gray-50">
        <h2 class="font-black text-xl text-gray-800"><i class="fas fa-shopping-basket text-red-500 mr-2"></i>購物車</h2>
        <button onclick="toggleCart()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white"></div>
    <div class="p-4 border-t bg-gray-50">
        <div class="flex justify-between items-center font-black text-xl mb-4">
            <span class="text-gray-600">總計</span>
            <span id="total-price" class="text-red-600">$0</span>
        </div>
        <button id="btn-submit" onclick="submitOrder()" class="w-full bg-red-500 text-white py-3 rounded-xl font-bold text-lg shadow-lg hover:bg-red-600 transition disabled:opacity-50 disabled:cursor-not-allowed">確認送出訂單</button>
    </div>
</div>

<div id="modal-name" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 opacity-0 pointer-events-none transition-opacity">
    <div class="modal-container bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl transform scale-95 transition-transform">
        <h3 class="text-xl font-black text-gray-800 mb-2">👋 請問您是哪位？</h3>
        <p class="text-sm text-gray-500 mb-4">請輸入您的姓名，方便我們為您準備商品。</p>
        <input type="text" id="input-name" class="w-full border-2 border-gray-200 rounded-xl p-3 mb-4 focus:border-red-500 focus:ring-0 outline-none font-bold text-center text-lg" placeholder="您的姓名或暱稱">
        <div class="flex gap-2">
            <button onclick="closeNameModal()" class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl font-bold hover:bg-gray-200 transition">稍後</button>
            <button onclick="saveName()" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold shadow hover:bg-red-600 transition">確定</button>
        </div>
    </div>
</div>

<div id="modal-auth" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 opacity-0 pointer-events-none transition-opacity">
    <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl">
        <h3 id="auth-title" class="text-xl font-black text-gray-800 mb-4">🔒 安全驗證</h3>
        <input type="password" id="input-auth-pwd" class="w-full border-2 border-gray-200 rounded-xl p-3 mb-4 focus:border-gray-800 outline-none text-center tracking-widest" placeholder="請輸入管理員密碼">
        <div class="flex gap-2">
            <button onclick="closeAuthModal()" class="flex-1 bg-gray-100 text-gray-600 py-3 rounded-xl font-bold hover:bg-gray-200 transition">取消</button>
            <button id="btn-auth-confirm" class="flex-1 bg-gray-800 text-white py-3 rounded-xl font-bold shadow hover:bg-gray-900 transition">驗證</button>
        </div>
    </div>
</div>

<div id="modal-menu-edit" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 opacity-0 pointer-events-none transition-opacity">
    <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
        <h3 id="menu-modal-title" class="text-xl font-black text-gray-800 mb-4">📝 編輯品項</h3>
        <input type="hidden" id="menu-row-id">
        <div class="space-y-3 mb-6">
            <div><label class="block text-xs font-bold text-gray-500 mb-1">分類</label><input type="text" id="menu-cat" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500"></div>
            <div><label class="block text-xs font-bold text-gray-500 mb-1">品項名稱 *</label><input type="text" id="menu-name" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500"></div>
            <div><label class="block text-xs font-bold text-gray-500 mb-1">價格 *</label><input type="number" id="menu-price" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500"></div>
            <div><label class="block text-xs font-bold text-gray-500 mb-1">說明 (選填)</label><textarea id="menu-desc" class="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500 rows="2"></textarea></div>
        </div>
        <div class="flex gap-2">
            <button onclick="closeMenuModal()" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg font-bold hover:bg-gray-200 transition">取消</button>
            <button onclick="triggerMenuSave()" class="flex-1 bg-blue-500 text-white py-2 rounded-lg font-bold shadow hover:bg-blue-600 transition">儲存</button>
        </div>
    </div>
</div>

<script>
// --- 全局變數與初始化 ---
const API_URL = "https://script.google.com/macros/s/AKfycbyg1jntRUduMWO1MFOYmaVjp4fM8J8Tv_3f_NwJs8oqjRkvHMfMvJCLjbiQjWGu8jjy/exec"; // 請替換成您的部署網址
let cart = [];
let userName = localStorage.getItem("apan_user_name") || "";
let adminPwd = localStorage.getItem("apan_admin_pwd") || "";
let currentView = 'client';
let historyData = [];

window.onload = () => {
    updateNameDisplay();
    if(!userName) setTimeout(openNameModal, 500);
    fetchMenu();
    updateLoginUI();
};

async function callApi(payload) {
    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        return await res.json();
    } catch (e) { return { ok: false, message: e.message }; }
}

async function fetchMenu() {
    const res = await callApi({ action: "getMenu" });
    if(res.ok) {
        document.getElementById('marquee-text').innerText = res.marquee;
        // 渲染客戶端菜單 (簡略示範)
        let html = '';
        res.data.forEach(item => {
            html += `<div class="bg-white p-4 rounded-xl shadow-sm border flex justify-between items-center">
                <div><h4 class="font-bold text-gray-800">${item.name}</h4><p class="text-sm text-red-500 font-bold">$${item.price}</p></div>
                <button onclick='addToCart(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="bg-red-50 text-red-500 w-10 h-10 rounded-full hover:bg-red-100"><i class="fas fa-plus"></i></button>
            </div>`;
        });
        document.getElementById('client-menu-container').innerHTML = html;
        if(currentView === 'admin' && document.getElementById('admin-tab-menu').classList.contains('block')) {
             loadAdminMenu(); // 若在管理菜單頁面則連帶刷新
        }
    }
}

function addToCart(item) {
    const ex = cart.find(c => c.row === item.row);
    if(ex) ex.qty++; else cart.push({ ...item, qty: 1 });
    updateCartUI();
}

function updateItemQty(row, delta) {
    const idx = cart.findIndex(c => c.row === row);
    if(idx > -1) {
        cart[idx].qty += delta;
        if(cart[idx].qty <= 0) cart.splice(idx, 1);
        updateCartUI();
    }
}

function switchView(view) {
    currentView = view;
    document.getElementById('view-client').classList.toggle('hidden', view !== 'client');
    document.getElementById('view-admin').classList.toggle('hidden', view !== 'admin');
    if(view === 'admin') { switchAdminTab('orders'); loadAdminOrders(); }
}

function switchAdminTab(tab) {
    document.querySelectorAll('.admin-tab').forEach(el => {
        el.classList.remove('bg-gray-800', 'text-white');
        el.classList.add('bg-white', 'text-gray-600');
    });
    event.target.classList.remove('bg-white', 'text-gray-600');
    event.target.classList.add('bg-gray-800', 'text-white');

    document.getElementById('admin-tab-orders').classList.add('hidden');
    document.getElementById('admin-tab-history').classList.add('hidden');
    document.getElementById('admin-tab-menu').classList.add('hidden');
    
    document.getElementById(`admin-tab-${tab}`).classList.remove('hidden');
    
    if(tab === 'orders') loadAdminOrders();
    if(tab === 'history') loadHistoryData();
    if(tab === 'menu') loadAdminMenu();
}

function adminLogout() {
    adminPwd = "";
    localStorage.removeItem("apan_admin_pwd");
    updateLoginUI();
    switchView('client');
}

function updateLoginUI() {
    const btn = document.getElementById('btn-admin-login');
    if(adminPwd) {
        btn.innerHTML = '<i class="fas fa-user-shield text-blue-500"></i>';
        btn.onclick = () => switchView(currentView === 'client' ? 'admin' : 'client');
    } else {
        btn.innerHTML = '<i class="fas fa-cog"></i>';
        btn.onclick = () => reqAuth('login');
    }
}

// ==========================================
// 以下是您提供的原始邏輯 (加上修改的部分)
// ==========================================

function updateCartUI() {
    let total = 0, count = 0;
    const html = cart.map(c => {
        total += c.price * c.qty; count += c.qty;
        return `<div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100"><div class="flex-1"><div class="font-bold">${c.name}</div><div class="text-xs text-red-500 font-bold">$${c.price} / 單位</div></div><div class="flex items-center gap-3 bg-white px-3 py-2 rounded-xl border shadow-sm"><button class="text-gray-400" onclick="updateItemQty(${c.row},-1)">&minus;</button><span class="font-black w-4 text-center text-red-600">${c.qty}</span><button class="text-gray-400" onclick="updateItemQty(${c.row},1)">&plus;</button></div><div class="w-16 text-right font-black text-gray-700">$${c.price*c.qty}</div></div>`;
    }).join('');
    document.getElementById('cart-items').innerHTML = html || '<div class="text-center py-20"><i class="fas fa-shopping-basket text-5xl text-gray-100 mb-4"></i><p class="text-gray-400">購物車空空的喔</p></div>';
    document.getElementById('header-cart-count').innerText = count;
    document.getElementById('total-price').innerText = `$${total}`;
}

function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); document.getElementById('overlay').classList.toggle('hidden'); document.body.classList.toggle('modal-active'); }
function openNameModal() { document.getElementById('modal-name').classList.remove('opacity-0', 'pointer-events-none'); document.getElementById('modal-name').querySelector('.modal-container').classList.remove('scale-95'); }
function closeNameModal() { document.getElementById('modal-name').classList.add('opacity-0', 'pointer-events-none'); document.getElementById('modal-name').querySelector('.modal-container').classList.add('scale-95'); }
function saveName() { const val = document.getElementById('input-name').value.trim(); if(val) { userName = val; localStorage.setItem("apan_user_name", val); updateNameDisplay(); closeNameModal(); } }
function updateNameDisplay() { document.getElementById('display-name').innerText = userName; }
function closeAuthModal() { document.getElementById('modal-auth').classList.add('opacity-0', 'pointer-events-none'); }
function closeMenuModal() { document.getElementById('modal-menu-edit').classList.add('opacity-0', 'pointer-events-none'); }

async function submitOrder() {
    if(!userName) { alert("請先設定您的姓名"); toggleCart(); openNameModal(); return; }
    if(!cart.length) return alert("您的購物車是空的");
    const btn = document.getElementById('btn-submit');
    btn.disabled = true; btn.innerText = "傳送中...";
    const res = await callApi({ action: "submitOrder", name: userName, items: cart });
    if(res.ok) { alert("下單成功！"); cart = []; updateCartUI(); toggleCart(); fetchMenu(); } else alert(res.message);
    btn.disabled = false; btn.innerText = "確認送出訂單";
}

async function loadAdminOrders() {
    document.getElementById('admin-status').innerText = "連線中...";
    const res = await callApi({ action: "getPendingOrdersMerged" });
    if(res.ok) {
        const list = res.data;
        document.getElementById('admin-status').innerText = list.length ? `目前有 ${list.length} 位客戶待處理` : "太棒了，目前沒有待處理訂單";
        
        document.getElementById('admin-orders-container').innerHTML = list.map(t => {
            const hasPending = t.hasPending;
            const actionBtn = hasPending
                ? `<button onclick="triggerMarkServed('${t.name}')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow transition w-full"><i class="fas fa-check mr-1"></i>標記勾選項目取貨</button>`
                : `<div class="text-center text-gray-400 text-sm font-bold py-2">待結帳品項</div>`;

            const itemsHtml = t.items.map(i => {
                const isPending = i.status === 'pending';
                const rowIdsStr = JSON.stringify(i.rowIds);
                
                if (isPending) {
                    return `<label class="flex justify-between items-center p-2 rounded-lg hover:bg-gray-50 cursor-pointer">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" value='${rowIdsStr}' class="order-check-${t.name} w-5 h-5 text-red-600 rounded focus:ring-red-500 cursor-pointer border-gray-300">
                            <div>
                                <span class="font-bold text-gray-800">${i.item}</span>
                                <span class="text-gray-500 text-xs ml-1">x${i.qty}</span>
                            </div>
                        </div>
                        <span class="font-bold text-gray-800">$${i.subtotal}</span>
                    </label>`;
                } else {
                    const safeRowIds = rowIdsStr.replace(/"/g, '&quot;');
                    return `<div class="flex justify-between items-center p-2 rounded-lg bg-green-50 border border-green-100">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-check-circle text-green-500"></i>
                            <div>
                                <span class="font-bold text-green-700">${i.item}</span>
                                <span class="text-green-600 text-xs ml-1">x${i.qty} (已備妥)</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                             <span class="font-bold text-green-700 mr-2">$${i.subtotal}</span>
                             <button onclick="reqAuth('batchClear', ${safeRowIds})" class="bg-gray-800 text-white text-xs px-2 py-1.5 rounded shadow hover:bg-black transition">結帳</button>
                        </div>
                    </div>`;
                }
            }).join('');

            return `<div class="border-2 rounded-2xl p-4 shadow-sm bg-white border-gray-100 animate-fade-in flex flex-col h-full">
                <div class="flex justify-between items-start mb-3 border-b pb-2">
                    <div>
                        <h3 class="font-black text-xl text-gray-800">${t.name}</h3>
                        <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">${formatDateTime(t.time)}</span>
                    </div>
                </div>
                <div class="flex-grow space-y-1 mb-4">
                    ${itemsHtml}
                </div>
                <div class="mt-auto">
                    <div class="flex justify-between items-center border-t pt-3 mb-3 font-black text-red-600 text-xl">
                        <span>總計</span>
                        <span>$${t.total}</span>
                    </div>
                    <div class="flex justify-end">
                        ${actionBtn}
                    </div>
                </div>
            </div>`;
        }).join('') || '<div class="col-span-full text-center py-20 text-gray-200"><i class="fas fa-check-circle text-6xl mb-4"></i><p>暫無訂單</p></div>';
    }
}

async function triggerMarkServed(userName) {
    const checkboxes = document.querySelectorAll(`.order-check-${userName}:checked`);
    if (checkboxes.length === 0) return alert("請勾選要標記取貨的品項");
    
    let allRowIds = [];
    checkboxes.forEach(cb => {
        const rows = JSON.parse(cb.value);
        allRowIds = allRowIds.concat(rows);
    });

    const btn = document.activeElement;
    const originalText = btn.innerText;
    btn.innerText = "處理中...";
    btn.disabled = true;

    const res = await callApi({ action: "batchUpdateStatus", rowIds: allRowIds, status: "served" });
    if (res.ok) {
        loadAdminOrders();
    } else {
        alert(res.message);
        btn.innerText = originalText;
        btn.disabled = false;
    }
}

async function loadHistoryData() {
    const res = await callApi({ action: "getOrderHistory" });
    if(res.ok) {
        historyData = res.data;
        initHistoryFilters();
        applyHistoryFilters();
    }
}

function initHistoryFilters() {
    const dateSet = new Set(), itemSet = new Set(), nameSet = new Set();
    historyData.forEach(r => {
        if(r.time) { const d = new Date(r.time); dateSet.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`); }
        itemSet.add(r.item); nameSet.add(r.name);
    });
    document.getElementById('hist-filter-date').innerHTML = '<option value="all">📅 所有日期</option>' + [...dateSet].sort().reverse().map(d => `<option value="${d}">${d}</option>`).join('');
    document.getElementById('hist-filter-item').innerHTML = '<option value="all">📦 所有品項</option>' + [...itemSet].sort().map(i => `<option value="${i}">${i}</option>`).join('');
    document.getElementById('hist-filter-name').innerHTML = '<option value="all">👤 所有人員</option>' + [...nameSet].sort().map(n => `<option value="${n}">${n}</option>`).join('');
}

function applyHistoryFilters() {
    const dv = document.getElementById('hist-filter-date').value, iv = document.getElementById('hist-filter-item').value, nv = document.getElementById('hist-filter-name').value;
    let tQty = 0, tAmt = 0;
    const filtered = historyData.filter(r => {
        const d = new Date(r.time), ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        return (dv==='all'||ds===dv) && (iv==='all'||r.item===iv) && (nv==='all'||r.name===nv);
    });
    
    const selectAllBox = document.getElementById('select-all-history');
    if(selectAllBox) selectAllBox.checked = false;

    document.getElementById('history-tbody').innerHTML = filtered.map(r => {
        tQty += r.qty; tAmt += r.subtotal;
        let badgeClass = "bg-gray-100 text-gray-500";
        if(r.status === 'pending') badgeClass = "bg-yellow-100 text-yellow-700";
        if(r.status === 'served') badgeClass = "bg-green-100 text-green-700";
        if(r.status === 'cleared') badgeClass = "bg-blue-50 text-blue-700";

        return `<tr class="hover:bg-gray-50">
            <td class="px-4 py-3 text-center checkbox-cell">
                <input type="checkbox" value="${r.row}" class="history-checkbox w-4 h-4 text-red-600 rounded focus:ring-red-500 cursor-pointer" onclick="updateSelectAllState()">
            </td>
            <td data-label="日期" class="px-4 py-3">${formatDateTime(r.time)}</td>
            <td data-label="姓名" class="px-4 py-3 font-bold">${r.name}</td>
            <td data-label="品項" class="px-4 py-3">${r.item}</td>
            <td data-label="數量" class="px-4 py-3">${r.qty}</td>
            <td data-label="小計" class="px-4 py-3 font-black text-red-600">$${r.subtotal}</td>
            <td data-label="操作" class="px-4 py-3 text-center flex items-center justify-center gap-2">
                 <span class="text-[10px] font-bold uppercase tracking-wide px-2 py-0.5 rounded ${badgeClass}">${r.status}</span>
                 <button onclick="reqAuth('deleteRow', ${r.row})" class="bg-red-50 text-red-500 w-8 h-8 rounded-full hover:bg-red-100 transition"><i class="fas fa-trash-alt"></i></button>
            </td>
        </tr>`;
    }).join('');
    document.getElementById('hist-total-qty').innerText = tQty;
    document.getElementById('hist-total-amt').innerText = `$${tAmt}`;
}

function toggleAllHistoryRows() {
    const isChecked = document.getElementById('select-all-history').checked;
    document.querySelectorAll('.history-checkbox').forEach(cb => cb.checked = isChecked);
}

function updateSelectAllState() {
    const all = document.querySelectorAll('.history-checkbox');
    const checked = document.querySelectorAll('.history-checkbox:checked');
    const selectAllBox = document.getElementById('select-all-history');
    if(all.length > 0 && all.length === checked.length) selectAllBox.checked = true;
    else selectAllBox.checked = false;
}

function resetHistoryFilters() { 
    document.getElementById('hist-filter-date').value = 'all'; 
    document.getElementById('hist-filter-item').value = 'all'; 
    document.getElementById('hist-filter-name').value = 'all'; 
    applyHistoryFilters(); 
}

function triggerDeleteSelected() {
    const checkboxes = document.querySelectorAll('.history-checkbox:checked');
    if(checkboxes.length === 0) return alert("請先勾選要刪除的訂單");
    const rows = Array.from(checkboxes).map(cb => cb.value);
    reqAuth('deleteSelected', rows);
}

// 統一驗證函式：自動檢查 adminPwd，若有則直接執行，若無則跳窗
function reqAuth(action, target) {
    if (action === 'login') {
        showAuthModal(action, target);
        return;
    }

    if (adminPwd) {
        performAction(action, target, adminPwd);
    } else {
        showAuthModal(action, target);
    }
}

function showAuthModal(action, target) {
    const modal = document.getElementById('modal-auth');
    const input = document.getElementById('input-auth-pwd');
    const confirmBtn = document.getElementById('btn-auth-confirm');
    input.value = "";
    modal.classList.remove('opacity-0', 'pointer-events-none');
    
    if (action === 'login') document.getElementById('auth-title').innerText = "管理員登入";
    else if (action === 'batchClear') document.getElementById('auth-title').innerText = "品項結帳確認";
    else if (action === 'deleteSelected') document.getElementById('auth-title').innerText = `刪除 ${target.length} 筆資料`;
    else document.getElementById('auth-title').innerText = "安全驗證";

    const newBtn = confirmBtn.cloneNode(true);
    confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);

    newBtn.onclick = () => {
        const pwd = input.value;
        if(!pwd) return alert("請輸入密碼");
        
        if (action === 'login') {
            handleLogin(pwd);
        } else {
            performAction(action, target, pwd, true); 
        }
    };
}

async function handleLogin(pwd) {
    const btn = document.getElementById('btn-auth-confirm');
    btn.disabled = true;
    btn.innerText = "驗證中...";
    const res = await callApi({ action: "verifyAdmin", password: pwd });
    if (res.ok) {
        adminPwd = pwd;
        localStorage.setItem("apan_admin_pwd", pwd);
        updateLoginUI();
        closeAuthModal();
        alert("登入成功！現在您可以直接執行管理操作。");
        if (currentView === 'client') switchView('admin');
    } else {
        alert("密碼錯誤");
    }
    btn.disabled = false;
    btn.innerText = "驗證";
}

async function performAction(action, target, pwd, isOneTime = false) {
    let res;
    if(isOneTime) document.getElementById('btn-auth-confirm').disabled = true;

    if(action === 'deleteRow') res = await callApi({ action: "deleteOrder", row: target, password: pwd });
    else if(action === 'deleteAll') res = await callApi({ action: "deleteAllOrders", password: pwd });
    else if(action === 'deleteSelected') res = await callApi({ action: "deleteSelectedOrders", rows: target, password: pwd });
    else if(action === 'batchClear') res = await callApi({ action: "batchUpdateStatus", rowIds: target, status: "cleared", password: pwd });

    if(isOneTime) document.getElementById('btn-auth-confirm').disabled = false;

    if(res && res.ok) { 
        if(isOneTime) closeAuthModal(); 
        if(action === 'batchClear') loadAdminOrders(); else loadHistoryData(); 
    } else {
        if (!isOneTime && res.message === "驗證碼錯誤") {
            adminLogout();
            alert("授權失效，請重新登入");
        } else {
            alert(res ? res.message : "密碼錯誤");
        }
    }
}

function triggerDeleteAllOrders() { if(confirm("確定要刪除所有歷史訂單嗎？")) reqAuth('deleteAll', null); }

async function loadAdminMenu() {
    const res = await callApi({ action: "getMenu" });
    if(res.ok) {
        // 新增：在獲取菜單時，同時將跑馬燈文字自動填入「公告設定」輸入框內
        const annInput = document.getElementById('admin-announcement-input');
        if (annInput) annInput.value = res.marquee || '';

        document.getElementById('admin-menu-tbody').innerHTML = res.data.map(i => `<tr>
            <td data-label="分類" class="px-4 py-3 text-xs font-bold text-gray-400">${i.category}</td>
            <td data-label="名稱" class="px-4 py-3 font-bold">${i.name}</td>
            <td data-label="價格" class="px-4 py-3 font-black text-red-600">$${i.price}</td>
            <td data-label="操作" class="px-4 py-3 text-center">
                <button onclick='openMenuModal("edit", ${JSON.stringify(i).replace(/'/g, "&apos;")})' class="bg-blue-50 text-blue-500 w-8 h-8 rounded-full mr-2"><i class="fas fa-edit"></i></button>
                <button onclick="triggerMenuDelete(${i.row})" class="bg-red-50 text-red-400 w-8 h-8 rounded-full"><i class="fas fa-trash"></i></button>
            </td>
        </tr>`).join('');
    }
}

// ==============================
// 新增：儲存公告相關功能
// ==============================
function triggerSaveAnnouncement() {
    const text = document.getElementById('admin-announcement-input').value.trim();
    if (!text) return alert("請輸入公告內容");

    if (adminPwd) {
        execSaveAnnouncement(text, adminPwd);
    } else {
        const modal = document.getElementById('modal-auth');
        const input = document.getElementById('input-auth-pwd');
        input.value = "";
        modal.classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById('auth-title').innerText = "儲存公告";
        
        const btn = document.getElementById('btn-auth-confirm');
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        
        newBtn.onclick = () => {
            const pwd = input.value;
            if(!pwd) return alert("請輸入密碼");
            execSaveAnnouncement(text, pwd, true);
        };
    }
}

async function execSaveAnnouncement(text, pwd, isOneTime = false) {
    const res = await callApi({ action: "saveAnnouncement", text: text, password: pwd });
    if (res.ok) { 
        if (isOneTime) closeAuthModal(); 
        alert("公告已更新！");
        fetchMenu(); // 重新整理前台跑馬燈
    } else {
        alert(res.message);
    }
}
// ==============================

function openMenuModal(mode, data=null) {
    document.getElementById('modal-menu-edit').classList.remove('opacity-0', 'pointer-events-none');
    document.getElementById('menu-modal-title').innerText = mode==='add'?'✨ 新增品項':'📝 編輯品項';
    document.getElementById('menu-row-id').value = data ? data.row : '';
    document.getElementById('menu-cat').value = data ? data.category : '';
    document.getElementById('menu-name').value = data ? data.name : '';
    document.getElementById('menu-price').value = data ? data.price : '';
    document.getElementById('menu-desc').value = data ? data.desc : '';
}

function triggerMenuSave() {
    const row = document.getElementById('menu-row-id').value;
    const payload = { category: document.getElementById('menu-cat').value, name: document.getElementById('menu-name').value, price: document.getElementById('menu-price').value, desc: document.getElementById('menu-desc').value };
    if(!payload.name || !payload.price) return alert("名稱與價格為必填");
    
    if (adminPwd) {
        execMenuSave(payload, row, adminPwd);
    } else {
        const modal = document.getElementById('modal-auth');
        const input = document.getElementById('input-auth-pwd');
        input.value = "";
        modal.classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById('auth-title').innerText = "儲存品項";
        
        const btn = document.getElementById('btn-auth-confirm');
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        
        newBtn.onclick = () => {
            const pwd = input.value;
            execMenuSave(payload, row, pwd, true);
        };
    }
}

async function execMenuSave(payload, row, pwd, isOneTime = false) {
    const res = await callApi({ action: "saveMenuItem", row, ...payload, password: pwd });
    if(res.ok) { 
        if(isOneTime) closeAuthModal(); 
        closeMenuModal(); 
        loadAdminMenu(); 
        fetchMenu(); 
    } else alert(res.message);
}

function triggerMenuDelete(row) {
    if (adminPwd) {
        execMenuDelete(row, adminPwd);
    } else {
        const modal = document.getElementById('modal-auth');
        const input = document.getElementById('input-auth-pwd');
        input.value = "";
        modal.classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById('auth-title').innerText = "刪除品項";
        
        const btn = document.getElementById('btn-auth-confirm');
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        
        newBtn.onclick = () => {
            const pwd = input.value;
            execMenuDelete(row, pwd, true);
        };
    }
}

async function execMenuDelete(row, pwd, isOneTime = false) {
    const res = await callApi({ action: "deleteMenuItem", row, password: pwd });
    if(res.ok) { 
        if(isOneTime) closeAuthModal(); 
        loadAdminMenu(); 
        fetchMenu(); 
    } else alert(res.message);
}

function formatDateTime(isoStr) {
    if(!isoStr) return "--/--";
    const d = new Date(isoStr);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
