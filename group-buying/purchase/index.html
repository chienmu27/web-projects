<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽球隊團購</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f9ff; }
    .product-img { width: 100%; height: 180px; object-fit: cover; background-color: #eee; cursor: pointer; transition: opacity 0.2s; }
    .cart-drawer { transition: transform 0.3s ease-in-out; }
    .cart-open { transform: translateX(0); }
    .cart-closed { transform: translateX(100%); }
    .spinner { border: 4px solid rgba(0, 0, 0, 0.1); border-left-color: #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .category-btn { white-space: nowrap; transition: all 0.2s; }
    .category-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
    .modal-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="text-gray-800 flex flex-col min-h-screen">

  <nav class="bg-blue-900 text-white p-3 sticky top-0 z-30 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold flex items-center">
        <i class="fas fa-feather-alt mr-2"></i>
        <span>羽球隊團購</span>
      </h1>
      <button onclick="toggleCart()" class="relative flex items-center gap-2 bg-blue-700 px-4 py-2 rounded-full">
        <span class="font-bold text-yellow-300 text-sm">檢查購物車</span>
        <i class="fas fa-shopping-cart text-2xl text-white"></i>
        <span id="cartCount" class="absolute -top-1 -right-2 bg-red-600 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
      </button>
    </div>
  </nav>

  <div id="announcementBar" class="bg-yellow-100 text-yellow-800 p-2 text-center text-sm font-bold hidden">
    <i class="fas fa-bullhorn mr-2"></i><span id="announcementText"></span>
  </div>

  <div class="container mx-auto p-4 mb-20 flex-1">
    <div id="categoryContainer" class="flex overflow-x-auto gap-2 mb-6 pb-2"></div>
    <div id="loading" class="text-center py-10">
      <div class="spinner mx-auto mb-2"></div><p>載入中...</p>
    </div>
    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </div>

  <div id="cartSidebar" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white shadow-2xl z-40 cart-drawer cart-closed flex flex-col">
    <div class="p-4 bg-blue-900 text-white flex justify-between items-center">
      <h2 class="text-lg font-bold">購物車明細</h2>
      <button onclick="toggleCart()"><i class="fas fa-times text-2xl"></i></button>
    </div>
    <div class="flex-1 overflow-y-auto p-4" id="cartItems"></div>

    <div class="p-5 bg-white border-t">
      <div class="mb-4 space-y-3">
        <div>
          <label class="block text-sm font-bold mb-1">購買人姓名 *</label>
          <input type="text" id="buyerName" list="nameHistory" class="w-full border rounded-lg p-2.5" placeholder="請輸入姓名">
          <datalist id="nameHistory"></datalist>
        </div>
        <div>
          <label class="block text-sm font-bold mb-1">電子信箱 *</label>
          <input type="email" id="buyerEmail" list="emailHistory" class="w-full border rounded-lg p-2.5" placeholder="點擊自動填寫或輸入信箱">
          <datalist id="emailHistory"></datalist>
        </div>
      </div>
      <div class="flex justify-between items-end mb-4">
        <span class="text-gray-600">總金額</span>
        <span id="cartTotal" class="text-2xl font-bold text-red-600">$0</span>
      </div>
      <button onclick="submitOrder()" id="btnSubmit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">確認送出訂單</button>
    </div>
  </div>

  <div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black bg-opacity-60 z-30 hidden backdrop-blur-sm"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz3h5b7xqz3TlmThbWPl1y2upIA3vr3rbcJgoi2l4IOIAqF-0ODaRo3981vwWNWpqNX4g/exec";
    let allProducts = []; 
    let cart = [];
    let userLoginEmail = ""; // 儲存目前登入者信箱

    window.onload = init;

    async function init() {
      loadHistory(); // 載入歷史紀錄
      fetchUserEmail(); // 抓取目前登入信箱
      await Promise.all([loadConfig(), loadMenu()]);
    }

    // 1. 抓取目前登入者信箱
    async function fetchUserEmail() {
      try {
        // 方法 A: 透過 fetch
        const res = await fetch(API_URL + "?action=getUserEmail");
        const json = await res.json();
        if (json.ok && json.email) {
          userLoginEmail = json.email;
          setupEmailFocus();
        }
      } catch (e) { console.log("無法獲取登入信箱"); }
    }

    function setupEmailFocus() {
      const emailInput = document.getElementById("buyerEmail");
      emailInput.addEventListener('focus', function() {
        if (!this.value && userLoginEmail) {
          this.value = userLoginEmail;
        }
      });
    }

    // 2. 歷史紀錄功能 (LocalStorage)
    function loadHistory() {
      const names = JSON.parse(localStorage.getItem("history_names") || "[]");
      const emails = JSON.parse(localStorage.getItem("history_emails") || "[]");
      
      updateDatalist("nameHistory", names);
      updateDatalist("emailHistory", emails);
    }

    function saveToHistory(name, email) {
      let names = JSON.parse(localStorage.getItem("history_names") || "[]");
      let emails = JSON.parse(localStorage.getItem("history_emails") || "[]");

      if (!names.includes(name)) names.push(name);
      if (!emails.includes(email)) emails.push(email);

      localStorage.setItem("history_names", JSON.stringify(names.slice(-5))); // 只存最近5筆
      localStorage.setItem("history_emails", JSON.stringify(emails.slice(-5)));
    }

    function updateDatalist(id, list) {
      const dl = document.getElementById(id);
      dl.innerHTML = list.map(item => `<option value="${item}">`).join("");
    }

    // --- 原有邏輯 ---
    async function loadConfig() {
      try {
        const res = await fetch(API_URL + "?action=getConfig");
        const json = await res.json();
        if (json.ok && json.notice) {
          document.getElementById("announcementText").innerText = json.notice;
          document.getElementById("announcementBar").classList.remove("hidden");
        }
      } catch (e) {}
    }

    async function loadMenu() {
      try {
        const res = await fetch(API_URL + "?action=getMenu");
        const json = await res.json();
        if (json.ok) {
          allProducts = json.data;
          renderCategories();
          renderProducts(allProducts);
        }
      } finally {
        document.getElementById("loading").classList.add("hidden");
      }
    }

    function renderCategories() {
      const container = document.getElementById("categoryContainer");
      const categories = ["全部", ...new Set(allProducts.map(p => p.category))];
      container.innerHTML = categories.map(cat => `
        <button onclick="filterCategory('${cat}')" class="category-btn px-4 py-2 rounded-full border bg-white font-bold ${cat === '全部' ? 'active' : ''}" data-cat="${cat}">${cat}</button>
      `).join("");
    }

    function filterCategory(cat) {
      document.querySelectorAll('.category-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.cat === cat));
      renderProducts(cat === "全部" ? allProducts : allProducts.filter(p => p.category === cat));
    }

    function renderProducts(products) {
      const grid = document.getElementById("productGrid");
      grid.innerHTML = products.map(p => `
        <div class="bg-white rounded-xl shadow-md overflow-hidden flex flex-col border">
          <img src="${p.image || ''}" class="product-img">
          <div class="p-4 flex-1 flex flex-col">
            <span class="text-xs text-blue-600 font-bold">${p.category}</span>
            <h3 class="font-bold text-lg">${p.name}</h3>
            <div class="mt-auto pt-4 flex justify-between items-center">
              <span class="text-xl font-bold text-red-600">$${p.price}</span>
              <button onclick="addToCart(${p.row})" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg active:scale-95 transition">加入</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    function addToCart(row) {
      const item = allProducts.find(p => p.row === row);
      const existing = cart.find(c => c.row === row);
      if (existing) existing.qty++;
      else cart.push({ ...item, qty: 1, remark: "" });
      updateCartUI();
      toggleCart(true);
    }

    function updateCartUI() {
      const container = document.getElementById("cartItems");
      const totalQty = cart.reduce((acc, c) => acc + c.qty, 0);
      document.getElementById("cartCount").innerText = totalQty;
      document.getElementById("cartCount").classList.toggle("hidden", totalQty === 0);
      document.getElementById("cartTotal").innerText = "$" + cart.reduce((acc, c) => acc + (c.price * c.qty), 0);

      if (cart.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-400 mt-10">購物車是空的</p>`;
        return;
      }

      container.innerHTML = cart.map((item, index) => `
        <div class="border-b py-4">
          <div class="flex justify-between font-bold">
            <span>${item.name}</span>
            <span>$${item.price * item.qty}</span>
          </div>
          <div class="flex items-center gap-2 mt-2">
            <button onclick="changeQty(${index}, -1)" class="px-2 border">-</button>
            <span>${item.qty}</span>
            <button onclick="changeQty(${index}, 1)" class="px-2 border">+</button>
            <input type="text" placeholder="備註" class="flex-1 text-sm border p-1" oninput="updateRemark(${index}, this.value)" value="${item.remark}">
          </div>
        </div>
      `).join("");
    }

    function changeQty(index, delta) {
      cart[index].qty += delta;
      if (cart[index].qty <= 0) cart.splice(index, 1);
      updateCartUI();
    }
    function updateRemark(index, val) { cart[index].remark = val; }

    function toggleCart(open) {
      const sidebar = document.getElementById("cartSidebar");
      const overlay = document.getElementById("overlay");
      const show = open !== undefined ? open : sidebar.classList.contains("cart-closed");
      sidebar.classList.toggle("cart-closed", !show);
      sidebar.classList.toggle("cart-open", show);
      overlay.classList.toggle("hidden", !show);
    }

    async function submitOrder() {
      const name = document.getElementById("buyerName").value.trim();
      const email = document.getElementById("buyerEmail").value.trim();
      if (!name || !email || cart.length === 0) return alert("請填寫完整資料並選購商品");

      const btn = document.getElementById("btnSubmit");
      btn.disabled = true;
      btn.innerText = "處理中...";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ action: "submitOrder", buyerName: name, email: email, items: cart })
        });
        const json = await res.json();
        if (json.ok) {
          saveToHistory(name, email); // 成功後存入歷史紀錄
          alert("訂單已送出！");
          cart = [];
          updateCartUI();
          toggleCart(false);
          loadHistory(); // 更新提示選單
        }
      } catch (e) {
        alert("送出失敗");
      } finally {
        btn.disabled = false;
        btn.innerText = "確認送出訂單";
      }
    }
  </script>
</body>
</html>
