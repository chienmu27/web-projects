<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chienmu27 系統管理首頁</title>

<style>
  body {
    font-family: "Microsoft JhengHei", Arial, Helvetica, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 30px;
    color: #333;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  /* 管理面板樣式 */
  .admin-panel {
    max-width: 900px;
    margin: 0 auto 40px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .admin-panel h3 {
    margin-top: 0;
    color: #007bff;
    border-left: 5px solid #007bff;
    padding-left: 10px;
    margin-bottom: 20px;
  }

  .form-group {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: flex-end;
  }

  .input-item {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 200px;
  }

  .input-item label {
    font-size: 14px;
    margin-bottom: 8px;
    font-weight: bold;
  }

  .input-item input {
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
  }

  .btn-group {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-submit {
    background: #28a745;
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: 0.3s;
  }

  .btn-submit:hover {
    background: #218838;
  }

  .btn-reset {
    background: #6c757d;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
  }

  .btn-reset:hover {
    background: #5a6268;
  }

  /* 容器與卡片樣式 */
  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    width: 320px;
  }

  .card h2 {
    margin-top: 0;
    border-bottom: 2px solid #eee;
    padding-bottom: 10px;
    color: #333;
    font-size: 1.25rem;
  }

  .section {
    margin: 15px 0;
    padding-bottom: 10px;
    border-bottom: 1px dashed #f0f0f0;
  }

  .section:last-child {
    border-bottom: none;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .section-title {
    font-weight: bold;
    color: #444;
    font-size: 0.95rem;
  }

  .btn-delete {
    background: none;
    border: none;
    color: #bbb;
    cursor: pointer;
    font-size: 12px;
    padding: 2px 5px;
    border-radius: 4px;
    transition: 0.2s;
  }

  .btn-delete:hover {
    color: #dc3545;
    background: #fff1f0;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .links a {
    display: inline-block;
    padding: 6px 12px;
    background: #007bff;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
    transition: 0.2s;
  }

  .links a:hover {
    background: #0056b3;
  }
</style>
</head>

<body>

<h1>chienmu27 系統首頁</h1>

<!-- 管理面板 -->
<div class="admin-panel">
  <h3>➕ 加入新網址</h3>
  <div class="form-group">
    <div class="input-item">
      <label>網頁分類 (例如: 🏫 點名系統)</label>
      <input type="text" id="catInput" placeholder="輸入分類名稱" required>
    </div>
    <div class="input-item">
      <label>網頁名稱</label>
      <input type="text" id="nameInput" placeholder="例如：社團點名" required>
    </div>
    <div class="input-item">
      <label>網址 (URL)</label>
      <input type="url" id="urlInput" placeholder="https://..." required>
    </div>
  </div>
  <div class="btn-group">
    <button class="btn-submit" onclick="addLink()">送出寫入</button>
    <button class="btn-reset" onclick="clearStorage()">初始化資料</button>
  </div>
</div>

<div class="container" id="cardContainer">
  <!-- JavaScript 自動生成內容 -->
</div>

<script>
// ================= 設定區域 =================
const VERIFY_CODE = "2727"; // 刪除與重設的驗證碼

// 初始預設資料
const defaultData = [
  {
    category: "🍳 Breakfast 系統",
    sections: [
      { title: "breakfast260222", links: [{ text: "前台訂餐", url: "breakfast/breakfast260222/" }] },
      { title: "breakfast0222", links: [{ text: "後台管理", url: "breakfast/breakfast0222/admin.html" }] }
    ]
  },
  {
    category: "🏫 點名系統",
    sections: [
      { 
        title: "社團點名系統", 
        links: [
          { text: "04設定匯入版", url: "clubs/rollcall/rollcall0208/" },
          { text: "05刪除整欄版", url: "clubs/rollcall/rollcall150208/" },
          { text: "春季風格版", url: "clubs/rollcall/rollcall2602/" }
        ] 
      },
      { title: "基礎班點名簿", links: [{ text: "前往系統", url: "https://chienmu27.github.io/web-projects/rollcall/basic223/" }] },
      { title: "生教點名簿", links: [{ text: "前往系統", url: "https://chienmu27.github.io/web-projects/rollcall/life-education/" }] },
      { title: "教學點名簿", links: [{ text: "前往系統", url: "https://chienmu27.github.io/web-projects/rollcall/curriculum213/" }] },
      { title: "輔導點名簿", links: [{ text: "前往系統", url: "https://chienmu27.github.io/web-projects/rollcall/counseling267/" }] }
    ]
  },
  {
    category: "📢 公告",
    sections: [
      { title: "社團公告系統", links: [{ text: "查看公告", url: "announcement/clubs/index.html" }] }
    ]
  },
  {
    category: "🛒 團購管理系統",
    sections: [
      { 
        title: "羽球隊團購", 
        links: [
          { text: "前台", url: "https://chienmu27.github.io/web-projects/group-buying/purchase/" },
          { text: "後台", url: "https://chienmu27.github.io/web-projects/group-buying/purchase/admin.html" }
        ] 
      },
      { title: "Egg團購", links: [{ text: "前往系統", url: "https://chienmu27.github.io/web-projects/group-buying/egg/" }] }
    ]
  },
  {
    category: "🏸 臨打管理系統",
    sections: [
      { title: "簡易版", links: [{ text: "前往系統", url: "https://chienmu27.github.io/web-projects/badminton/drop-in/" }] },
      { title: "前後台管理版", links: [{ text: "前台", url: "https://chienmu27.github.io/web-projects/badminton/temporary/" }, { text: "後台", url: "https://chienmu27.github.io/web-projects/badminton/temporary/admin.html" }] }
    ]
  }
];

// ================= 程式邏輯區域 =================

// 從 LocalStorage 載入資料
let siteData = JSON.parse(localStorage.getItem('myWebPortalData')) || JSON.parse(JSON.stringify(defaultData));

// 渲染頁面
function render() {
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';

  siteData.forEach((catObj, catIndex) => {
    const card = document.createElement('div');
    card.className = 'card';
    
    let sectionsHtml = '';
    catObj.sections.forEach((sec, secIndex) => {
      let linksHtml = '';
      sec.links.forEach(link => {
        linksHtml += `<a href="${link.url}" target="_blank" rel="noopener noreferrer">${link.text}</a>`;
      });

      sectionsHtml += `
        <div class="section">
          <div class="section-header">
            <div class="section-title">${sec.title}</div>
            <button class="btn-delete" onclick="deleteSection(${catIndex}, ${secIndex})">🗑️ 刪除</button>
          </div>
          <div class="links">${linksHtml}</div>
        </div>
      `;
    });

    card.innerHTML = `
      <h2>${catObj.category}</h2>
      ${sectionsHtml}
    `;
    container.appendChild(card);
  });
}

// 新增連結
function addLink() {
  const cat = document.getElementById('catInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  const url = document.getElementById('urlInput').value.trim();

  if (!cat || !name || !url) {
    alert('所有欄位皆為必填！');
    return;
  }

  let categoryObj = siteData.find(item => item.category === cat);

  if (categoryObj) {
    categoryObj.sections.push({
      title: name,
      links: [{ text: "前往系統", url: url }]
    });
  } else {
    siteData.push({
      category: cat,
      sections: [{ title: name, links: [{ text: "前往系統", url: url }] }]
    });
  }

  saveAndRefresh();
  // 清空輸入
  document.getElementById('catInput').value = '';
  document.getElementById('nameInput').value = '';
  document.getElementById('urlInput').value = '';
}

// 刪除特定網頁項目 (需驗證)
function deleteSection(catIndex, secIndex) {
  const userInput = prompt("⚠️ 確定要刪除此項目嗎？\n請輸入驗證碼以確認：");
  
  if (userInput === null) return; 

  if (userInput === VERIFY_CODE) {
    siteData[catIndex].sections.splice(secIndex, 1);
    
    // 若分類已空，刪除整個卡片
    if (siteData[catIndex].sections.length === 0) {
      siteData.splice(catIndex, 1);
    }
    
    saveAndRefresh();
    alert("已成功刪除。");
  } else {
    alert("驗證碼錯誤，動作已取消。");
  }
}

// 初始化/重設資料 (需驗證)
function clearStorage() {
  const userInput = prompt("🔥 注意：這將刪除所有新增的網址並回復至預設值！\n請輸入驗證碼以確認：");

  if (userInput === null) return;

  if (userInput === VERIFY_CODE) {
    localStorage.removeItem('myWebPortalData');
    // 深拷貝預設資料，防止引用污染
    siteData = JSON.parse(JSON.stringify(defaultData));
    render();
    alert("系統已回復至初始化狀態。");
  } else {
    alert("驗證碼錯誤，動作已取消。");
  }
}

// 儲存並重繪
function saveAndRefresh() {
  localStorage.setItem('myWebPortalData', JSON.stringify(siteData));
  render();
}

// 啟動渲染
render();
</script>

</body>
</html>
