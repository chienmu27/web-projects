<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生教點名簿</title>

  <style>
    :root {
      /* 國小生活教育風格色調 - 溫暖、活潑、粉彩 */
      --school-green: #81c784;
      --teacher-blue: #4fc3f7;
      --sun-yellow: #fff59d;
      
      --primary: #ff9800; /* 溫暖的橘色 */
      --success: #66bb6a; /* 草綠色 */
      --warning: #ffa726; /* 陽光橘 */
      --danger: #ef5350;  /* 柔和的紅色 */
      --gray: #78909c;
      --logout: #90a4ae;
      
      --card: rgba(255, 255, 255, 0.95);
      --card2: #fafafa;
      --line: #e0f7fa;
      --shadow: 0 10px 30px rgba(255, 152, 0, 0.15);
    }

    *{ box-sizing:border-box; }

    body {
      margin: 0;
      /* 使用帶有圓潤感的字體設定 */
      font-family: "Comic Sans MS", "Microsoft JhengHei", "PingFang TC", sans-serif;
      color: #3e2723;
      padding: 18px 12px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      /* 活潑的校園背景：天空藍與草地綠的柔和漸層 */
      background: linear-gradient(135deg, #e0f7fa 0%, #f1f8e9 50%, #fff9c4 100%);
      overflow-x: hidden;
      position: relative;
    }

    /* 漂浮的裝飾：小星星與小樹苗的感覺 */
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; opacity: 0.6;
      background-image: 
        radial-gradient(circle, #ffeb3b 0 3px, transparent 4px),
        radial-gradient(circle, #81c784 0 2px, transparent 3px);
      background-size: 120px 120px, 180px 180px;
      background-position: 0 0, 60px 60px;
      animation: floatBg 30s linear infinite;
    }

    @keyframes floatBg {
      0% { background-position: 0 0, 60px 60px; }
      100% { background-position: 120px 120px, 180px 180px; }
    }

    .card {
      width: min(580px, 100%); margin: 12px auto 24px;
      background: var(--card);
      /* 筆記本橫線背景效果 */
      background-image: repeating-linear-gradient(transparent, transparent 31px, #e1f5fe 31px, #e1f5fe 32px);
      background-position: 0 40px;
      border: 3px solid #b3e5fc;
      padding: 30px 25px 25px; 
      border-radius: 24px;
      box-shadow: var(--shadow); 
      position: relative; 
      overflow: hidden;
    }

    /* 卡片裝飾：筆記本頂部的彩色裝飾條 */
    .card::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0;
      height: 12px;
      background: repeating-linear-gradient(
        45deg,
        #ffcc80, #ffcc80 10px,
        #81c784 10px, #81c784 20px,
        #4fc3f7 20px, #4fc3f7 30px
      );
    }

    h2 { 
      text-align: center; margin: 0 0 20px 0; font-size: 30px; 
      color: #ef6c00; font-weight: 900; 
      text-shadow: 2px 2px 0px #ffe082;
      background-color: white; /* 蓋住筆記本線條 */
      display: inline-block;
      padding: 0 10px;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 10px;
    }
    h2::before { content: "🌱 "; font-size: 28px; }
    h2::after { content: " ☀️"; font-size: 28px; }

    .section {
      background: white; padding: 18px; border-radius: 16px;
      margin-bottom: 15px; border: 2px dashed #b2ebf2;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      position: relative;
    }

    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    button {
      padding: 14px; border: none; border-radius: 16px; cursor: pointer;
      font-weight: bold; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      font-size: 16px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit;
    }
    button:active { transform: scale(0.92); }
    button:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }

    .btn-club { 
      background: #e1f5fe; color: #0277bd; border: 2px solid #81d4fa; 
      width: 100%; margin-bottom: 12px; font-size: 18px; border-radius: 20px;
    }
    .btn-back { background: #f5f5f5; color: var(--gray); border: 2px solid #e0e0e0; width: 100%; height: 50px; }
    .btn-logout { background: var(--logout); color: white; width: 100%; height: 50px; }
    
    .btn-submit { background: var(--success); color: white; width: 100%; font-size: 18px; border: 2px solid #4caf50; }
    .btn-leave { background: var(--warning); color: white; width: 100%; font-size: 18px; border: 2px solid #ff9800; }
    .btn-danger { background: #ffebee; color: var(--danger); width: 100%; margin-top: 10px; border: 2px dashed var(--danger); }
    .btn-outline-danger { background: white; color: var(--danger); border: 2px solid var(--danger); padding: 6px 12px; font-size: 13px; border-radius: 10px; font-weight: bold; }
    .btn-login { background: #ffb74d; color: white; width: 100%; margin-top: 12px; font-size: 18px; border: 2px solid #f57c00; }

    .tabs { display: flex; gap: 10px; margin: 15px 0 20px; padding: 8px; border-radius: 16px; background: #e0f2f1; }
    .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #00695c; font-weight: bold; border-radius: 12px; transition: 0.3s; }
    .tab.active { color: white; background: #26a69a; box-shadow: 0 4px 10px rgba(38, 166, 154, 0.3); }

    #uncheckList, #checkedList { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .student-row { 
      display: flex; align-items: center; justify-content: space-between; 
      padding: 12px 16px; border: 2px solid #fff9c4; background: #fffde7; 
      border-radius: 14px; font-size: 16px; transition: 0.2s;
    }
    .student-row:hover { border-color: #ffcc80; background: #fff3e0; transform: scale(1.02); }
    .student-row span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; color: #5d4037; }

    input[type="date"], input[type="password"] { 
      width: 100%; padding: 14px; margin-top: 10px; border: 2px solid #cfd8dc; 
      border-radius: 14px; font-size: 16px; background: white; outline: none;
      transition: border-color 0.3s, box-shadow 0.3s; font-family: inherit;
    }
    input[type="date"]:focus, input[type="password"]:focus { 
      border-color: #4fc3f7; box-shadow: 0 0 0 4px rgba(79, 195, 247, 0.2); 
    }

    .hidden { display: none !important; }
    #status { text-align: center; margin-top: 16px; padding: 14px; border-radius: 12px; font-weight: bold; min-height: 20px; font-size: 16px; }
    .msg-success { background: #e8f5e9; color: #2e7d32; border: 2px solid #a5d6a7; }
    .msg-error { background: #ffebee; color: #c62828; border: 2px solid #ef9a9a; }
    .msg-loading { background: #e1f5fe; color: #0277bd; border: 2px solid #81d4fa; }

    /* 勾選框放大並美化 */
    input[type="checkbox"] {
      width: 20px; height: 20px; accent-color: #ff9800; cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>生教點名簿</h2>

  <div id="clubSelection">
    <p style="text-align:center; font-weight:bold; color: #ef6c00; font-size: 18px; background: white; display: inline-block; width: 100%;">
      🏫 請選擇班級或活動 🏫
    </p>
    <div id="clubBtns">讀取中... 🐌</div>
  </div>

  <div id="mainPage" class="hidden">
    <div class="btn-grid" style="margin-bottom:18px;">
      <button onclick="location.reload()" class="btn-back">🔙 更換班級</button>
      <button id="logoutBtn" class="btn-logout hidden" onclick="logout()">👋 登出</button>
      <div id="logoutPlaceholder"></div>
    </div>

    <h3 id="currentClubDisp" style="text-align:center; color: #43a047; margin-top:0; background: white; display: inline-block; width: 100%;"></h3>

    <div id="loginArea" class="section">
      <label><b>👨‍🏫 老師/生教組長權限驗證：</b></label>
      <input type="password" id="adminPwd" placeholder="請輸入密碼以開啟管理功能 🗝️">
      <button class="btn-login" onclick="login()">✨ 進入老師管理模式</button>
    </div>

    <div class="tabs">
      <div id="tab1" class="tab active" onclick="switchTab('take')">📝 點名登記</div>
      <div id="tab2" class="tab" onclick="switchTab('query')">🔍 已點名/請假</div>
    </div>

    <div class="section">
      <label><b>📅 點名日期：</b></label>
      <input type="date" id="targetDate" onchange="refreshLists()">
    </div>

    <div id="takeAttendanceArea">
      <div class="section">
        <label><b>✅ 待點名名單：</b></label>
        <div id="uncheckList"></div>
      </div>
      <div id="actionBtns" class="btn-grid hidden">
        <button id="btnSubmit" class="btn-submit" onclick="submitMulti('submit')">⭐ 出席打卡</button>
        <button id="btnLeave" class="btn-leave" onclick="submitMulti('leave')">💌 事假登記</button>
      </div>
    </div>

    <div id="queryAttendanceArea" class="hidden">
      <div class="section">
        <label><b>📋 已確認紀錄 (*為請假)：</b></label>
        <div id="checkedList"></div>
        <button id="delAllBtn" class="btn-danger hidden" onclick="confirmDeleteAll()">🗑️ 刪除今日整欄數據</button>
      </div>
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
  // ⚠️ 請修改為你的 GAS 部署網頁應用程式 URL
  const API_URL = "https://script.google.com/macros/s/AKfycbzlL-Wk3W0_ZwqPVekjKGnUWv8HjQCt31j1X9SfM1Wuq_hX33cXBS48D-SM84tUkrKH/exec";
  
  let curClub = "";
  let curMode = "take"; 

  window.onload = () => {
    fetchClubs();
    document.getElementById('targetDate').value = new Date().toISOString().split('T')[0];
  };

  async function fetchClubs() {
    try {
      const r = await fetch(`${API_URL}?action=getClubList`);
      const list = await r.json();
      const div = document.getElementById('clubBtns');
      div.innerHTML = "";
      list.forEach(c => {
        let b = document.createElement('button'); 
        b.className = "btn-club";
        b.innerText = "🏫 " + c; // 改為學校/班級的圖示
        b.onclick = () => { curClub = c; showMain(); };
        div.appendChild(b);
      });
    } catch(e) { showStatus("哎呀！網路連線失敗，請稍後再試 😢", "error"); }
  }

  function showMain() {
    document.getElementById('clubSelection').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('currentClubDisp').innerText = "當前班級：" + curClub;
    
    // 檢查 LocalStorage 是否已有登入
    const savedPwd = localStorage.getItem("att_pwd_" + curClub);
    updateLoginUI(savedPwd !== null);
    refreshLists();
  }

  function updateLoginUI(isLogged) {
    if (isLogged) {
      document.getElementById('loginArea').classList.add('hidden');
      document.getElementById('actionBtns').classList.remove('hidden');
      document.getElementById('delAllBtn').classList.remove('hidden');
      document.getElementById('logoutBtn').classList.remove('hidden');
      document.getElementById('logoutPlaceholder').classList.add('hidden');
    } else {
      document.getElementById('loginArea').classList.remove('hidden');
      document.getElementById('actionBtns').classList.add('hidden');
      document.getElementById('delAllBtn').classList.add('hidden');
      document.getElementById('logoutBtn').classList.add('hidden');
      document.getElementById('logoutPlaceholder').classList.remove('hidden');
    }
  }

  async function login() {
    const pwd = document.getElementById('adminPwd').value;
    if (!pwd) return showStatus("請輸入密碼喔！", "error");
    showStatus("權限驗證中，請稍候... ⏳", "loading");
    try {
      const r = await fetch(`${API_URL}?action=verifyPassword&clubName=${encodeURIComponent(curClub)}&password=${pwd}`);
      const res = await r.json();
      if (res.success) {
        localStorage.setItem("att_pwd_" + curClub, pwd);
        updateLoginUI(true);
        showStatus("驗證成功！老師權限已開啟 🎉", "success");
        setTimeout(clearStatus, 1500);
        refreshLists();
      } else {
        showStatus("密碼錯誤，請再試一次喔！", "error");
      }
    } catch(e) { showStatus("連線伺服器失敗 🔌", "error"); }
  }

  function logout() {
    localStorage.removeItem("att_pwd_" + curClub);
    location.reload();
  }

  function switchTab(m) {
    curMode = m;
    document.getElementById('tab1').className = m === 'take' ? 'tab active' : 'tab';
    document.getElementById('tab2').className = m === 'query' ? 'tab active' : 'tab';
    document.getElementById('takeAttendanceArea').className = m === 'take' ? '' : 'hidden';
    document.getElementById('queryAttendanceArea').className = m === 'query' ? '' : 'hidden';
    clearStatus(); refreshLists();
  }

  async function refreshLists() {
    const date = document.getElementById('targetDate').value;
    if(!curClub || !date) return;
    document.getElementById('uncheckList').innerHTML = "<p style='grid-column:span 2;text-align:center;'>名單讀取中... 🔍</p>";
    document.getElementById('checkedList').innerHTML = "<p style='grid-column:span 2;text-align:center;'>紀錄讀取中... 🔍</p>";
    
    const isLogged = localStorage.getItem("att_pwd_" + curClub) !== null;

    try {
      const [r1, r2] = await Promise.all([
        fetch(`${API_URL}?action=getStudents&clubName=${encodeURIComponent(curClub)}&date=${date}&mode=unchecked`),
        fetch(`${API_URL}?action=getStudents&clubName=${encodeURIComponent(curClub)}&date=${date}&mode=checked`)
      ]);
      renderList('uncheckList', await r1.json(), 'checkbox', isLogged);
      renderList('checkedList', await r2.json(), 'delete', isLogged);
    } catch(e) { showStatus("獲取數據失敗 🐛", "error"); }
  }

  function renderList(id, data, type, isLogged) {
    const container = document.getElementById(id);
    if (!data.length) {
      container.innerHTML = "<p style='grid-column:span 2;color:#9e9e9e;text-align:center;font-size:15px;'>目前空空的，沒有紀錄喔 🎈</p>";
      return;
    }
    container.innerHTML = "";
    data.forEach(nameText => {
      let d = document.createElement('div'); d.className = "student-row";
      if(type === 'checkbox') {
        const ctrl = isLogged ? `<input type="checkbox" name="stu" value="${nameText}">` : `<span style="color:#9e9e9e;font-size:13px;">(唯讀)</span>`;
        d.innerHTML = `<span>${nameText}</span>${ctrl}`;
      } else {
        const cleanName = nameText.replace('*', '');
        const ctrl = isLogged ? `<button class="btn-outline-danger" onclick="deleteSingle('${cleanName}')">撤銷</button>` : '';
        d.innerHTML = `<span>${nameText}</span>${ctrl}`;
      }
      container.appendChild(d);
    });
  }

  async function callPost(data) {
    const pwd = localStorage.getItem("att_pwd_" + curClub);
    if(!pwd) return showStatus("登入已失效，請重新驗證 🔒", "error");
    
    showStatus("正在把紀錄送到雲端... ☁️", "loading");
    try {
      const r = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({...data, clubName: curClub, password: pwd, date: document.getElementById('targetDate').value})
      });
      const res = await r.json();
      if(res.status === 'success') {
        showStatus(res.message + " 🌟", "success");
        setTimeout(() => { clearStatus(); refreshLists(); }, 1200);
      } else {
        showStatus(res.message, "error");
      }
    } catch(e) { showStatus("系統連線錯誤 🚧", "error"); }
  }

  function submitMulti(act) {
    const box = document.querySelectorAll('input[name="stu"]:checked');
    if(!box.length) return showStatus("請先勾選學生的名字喔！ 👆", "error");
    const stuList = Array.from(box).map(b => b.value);
    callPost({ action: act, students: stuList });
  }

  function deleteSingle(name) {
    if(!confirm("確定要撤銷「" + name + "」的紀錄嗎？")) return;
    callPost({ action: 'deleteSingle', studentName: name });
  }

  function confirmDeleteAll() {
    if(confirm("⚠️ 警告：確定要徹底刪除今天整欄的紀錄嗎？這會把大家的名字都清空喔！")) {
      callPost({ action: 'deleteAll' });
    }
  }

  function showStatus(msg, type) {
    const s = document.getElementById('status'); s.innerText = msg; s.className = "";
    if (type === "success") s.classList.add('msg-success');
    else if (type === "error") s.classList.add('msg-error');
    else s.classList.add('msg-loading');
  }

  function clearStatus() { 
    const s = document.getElementById('status'); if(s) { s.innerText = ""; s.className = ""; }
  }
</script>

</body>
</html>
