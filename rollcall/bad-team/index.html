<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽球隊點名簿</title>

  <style>
    :root{
      --court-green: #28a745;
      --pro-blue: #1a73e8;
      --shuttle-white: #ffffff;
      --shuttle-yellow: #ffeb3b;
      --primary: var(--pro-blue);
      --success: var(--court-green);
      --warning: #f29900;
      --danger: #d93025;
      --gray: #5f6368;
      --logout: #607d8b;
      --card: rgba(255, 255, 255, 0.85);
      --card2: rgba(255, 255, 255, 0.95);
      --line: #d1e3ff;
      --shadow: 0 14px 40px rgba(26, 115, 232, 0.15);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0; font-family: "Microsoft JhengHei", system-ui, sans-serif;
      color:#202124; padding: 18px 12px; min-height:100vh;
      display:flex; align-items:flex-start; justify-content:center;
      background: linear-gradient(135deg, #e3f2fd 0%, #f1f8e9 100%);
      overflow-x:hidden; position:relative;
    }

    .card{
      width:min(580px, 100%); margin: 12px auto 24px;
      background: var(--card); backdrop-filter: blur(15px);
      border: 2px solid var(--line); padding: 25px 20px 20px; border-radius: 20px;
      box-shadow: var(--shadow); position:relative; overflow:hidden;
    }

    h2{ text-align:center; margin: 0 0 15px 0; font-size: 28px; color: var(--pro-blue); font-weight: 900; }
    
    .section{
      background: var(--card2); padding: 16px; border-radius: 12px;
      margin-bottom: 15px; border: 1px solid var(--line);
      box-shadow: 0 6px 15px rgba(0,0,0,0.05);
    }

    .btn-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    button{
      padding: 14px; border: none; border-radius: 10px; cursor:pointer;
      font-weight: 900; transition: .2s ease; font-size: 16px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .btn-club{ background: linear-gradient(135deg, #e3f2fd, #bbdefb); color: var(--pro-blue); border: 1px solid var(--pro-blue); width:100%; margin-bottom:10px; }
    .btn-back{ background: #f8f9fa; color: var(--gray); border: 1px solid #ddd; width:100%; }
    .btn-logout{ background: var(--logout); color: white; width:100%; }
    .btn-submit{ background: var(--court-green); color: white; width:100%; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3); }
    .btn-leave{ background: var(--warning); color: white; width:100%; box-shadow: 0 4px 10px rgba(242, 153, 0, 0.3); }
    .btn-danger{ background: #fff5f5; color: var(--danger); width:100%; margin-top: 10px; border: 1px solid var(--danger); }
    .btn-outline-danger{ background: white; color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; font-size: 12px; border-radius: 6px; }
    .btn-login{ background: var(--pro-blue); color: white; width: 100%; margin-top: 10px; }

    .tabs{ display:flex; gap: 8px; margin: 10px 0 16px; padding: 5px; border-radius: 12px; background: #eaeff5; }
    .tab{ flex:1; padding: 12px; text-align:center; cursor:pointer; color: var(--gray); font-weight: bold; border-radius: 8px; }
    .tab.active{ color: var(--pro-blue); background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

    #uncheckList, #checkedList{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .student-row{ 
      display:flex; align-items:center; justify-content:space-between; 
      padding: 12px; border: 1px solid var(--line); background: white; 
      border-radius: 10px; font-size: 15px;
    }

    select, input[type="date"], input[type="password"]{ 
      width:100%; padding: 12px; margin-top: 8px; border: 2px solid #e0e0e0; 
      border-radius: 10px; font-size: 16px; background: white; outline:none;
    }

    .hidden{ display:none; }
    #status{ text-align:center; margin-top: 14px; padding: 12px; border-radius: 10px; font-weight: 900; }
    .msg-success{ background: #e8f5e9; color: var(--court-green); }
    .msg-error{ background: #ffebee; color: var(--danger); }
    .msg-loading{ background: #e3f2fd; color: var(--pro-blue); }
  </style>
</head>

<body>

<div class="card">
  <h2>羽球隊點名簿</h2>

  <div id="clubSelection">
    <p style="text-align:center;font-weight:900; color: var(--pro-blue);">🏆 請選擇課程時段 🏆</p>
    <div id="clubBtns">讀取中...</div>
  </div>

  <div id="mainPage" class="hidden">
    <div class="btn-grid" style="margin-bottom:14px;">
      <button onclick="location.reload()" class="btn-back">🔙 更換課程</button>
      <button id="logoutBtn" class="btn-logout hidden" onclick="logout()">🔑 登出</button>
      <div id="logoutPlaceholder"></div>
    </div>

    <h3 id="currentClubDisp" style="text-align:center; color: var(--court-green); margin-top:0;"></h3>

    <div id="loginArea" class="section">
      <label><b>🏸 教練權限驗證：</b></label>
      <input type="password" id="adminPwd" placeholder="請輸入密碼以開啟管理功能">
      <button class="btn-login" onclick="login()">進入教練管理模式</button>
    </div>

    <div class="tabs">
      <div id="tab1" class="tab active" onclick="switchTab('take')">點名登記</div>
      <div id="tab2" class="tab" onclick="switchTab('query')">已點名/請假</div>
    </div>

    <!-- 訓練日期與時段 -->
    <div class="section">
      <div style="display: flex; gap: 10px;">
        <div style="flex: 1;">
          <label><b>🕒 訓練時段：</b></label>
          <select id="timeSlot" onchange="refreshLists()">
            <option value="上午">上午</option>
            <option value="下午">下午</option>
            <option value="夜訓">夜訓</option>
          </select>
        </div>
        <div style="flex: 2;">
          <label><b>📅 訓練日期：</b></label>
          <input type="date" id="targetDate" onchange="refreshLists()">
        </div>
      </div>
    </div>

    <div id="takeAttendanceArea">
      <div class="section">
        <label id="uncheckTitle"><b>✅ 待點名名單：</b></label>
        <div id="uncheckList"></div>
      </div>
      <div id="actionBtns" class="btn-grid hidden">
        <button id="btnSubmit" class="btn-submit" onclick="submitMulti('submit')">出席打卡</button>
        <button id="btnLeave" class="btn-leave" onclick="submitMulti('leave')">事假登記</button>
      </div>
    </div>

    <div id="queryAttendanceArea" class="hidden">
      <div class="section">
        <label id="checkedTitle"><b>📋 已確認紀錄：</b></label>
        <div id="checkedList"></div>
        <button id="delAllBtn" class="btn-danger hidden" onclick="confirmDeleteAll()">❌ 刪除此時段整欄數據</button>
      </div>
    </div>

    <div id="status"></div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwH_4YllITCW2-OW75o7F_Qp-1omAHT7ezgHJkMWv67qCHskcOw48e5cRTSXeZbTO7g/exec"; // ⚠️ 請更換為你的部署網址
  
  let curClub = "";
  let curMode = "take"; 

  window.onload = () => {
    fetchClubs();
    document.getElementById('targetDate').value = new Date().toISOString().split('T')[0];
  };

  // 取得 完整日期標題 (時段 + 日期)
  function getFullDateKey() {
    const slot = document.getElementById('timeSlot').value;
    const date = document.getElementById('targetDate').value;
    return `${slot} ${date}`;
  }

  async function fetchClubs() {
    try {
      const r = await fetch(`${API_URL}?action=getClubList`);
      const list = await r.json();
      const div = document.getElementById('clubBtns');
      div.innerHTML = "";
      list.forEach(c => {
        let b = document.createElement('button'); 
        b.className = "btn-club";
        b.innerText = "🏸 " + c; 
        b.onclick = () => { curClub = c; showMain(); };
        div.appendChild(b);
      });
    } catch(e) { showStatus("網路連線失敗", "error"); }
  }

  function showMain() {
    document.getElementById('clubSelection').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('currentClubDisp').innerText = "當前社團：" + curClub;
    const savedPwd = localStorage.getItem("att_pwd_" + curClub);
    updateLoginUI(savedPwd !== null);
    refreshLists();
  }

  function updateLoginUI(isLogged) {
    document.getElementById('loginArea').classList.toggle('hidden', isLogged);
    document.getElementById('actionBtns').classList.toggle('hidden', !isLogged);
    document.getElementById('delAllBtn').classList.toggle('hidden', !isLogged);
    document.getElementById('logoutBtn').classList.toggle('hidden', !isLogged);
    document.getElementById('logoutPlaceholder').classList.toggle('hidden', isLogged);
  }

  async function login() {
    const pwd = document.getElementById('adminPwd').value;
    if (!pwd) return showStatus("請輸入認證密碼", "error");
    showStatus("權限驗證中...", "loading");
    try {
      const r = await fetch(`${API_URL}?action=verifyPassword&clubName=${encodeURIComponent(curClub)}&password=${pwd}`);
      const res = await r.json();
      if (res.success) {
        localStorage.setItem("att_pwd_" + curClub, pwd);
        updateLoginUI(true);
        showStatus("驗證成功！", "success");
        setTimeout(clearStatus, 1500);
        refreshLists();
      } else {
        showStatus("密碼錯誤", "error");
      }
    } catch(e) { showStatus("連線失敗", "error"); }
  }

  function logout() {
    localStorage.removeItem("att_pwd_" + curClub);
    location.reload();
  }

  function switchTab(m) {
    curMode = m;
    document.getElementById('tab1').className = m === 'take' ? 'tab active' : 'tab';
    document.getElementById('tab2').className = m === 'query' ? 'tab active' : 'tab';
    document.getElementById('takeAttendanceArea').classList.toggle('hidden', m !== 'take');
    document.getElementById('queryAttendanceArea').classList.toggle('hidden', m !== 'query');
    clearStatus(); refreshLists();
  }

  async function refreshLists() {
    const fullDate = getFullDateKey();
    if(!curClub || !document.getElementById('targetDate').value) return;
    
    // 更新 UI 上的標題顯示
    document.getElementById('checkedTitle').innerHTML = `<b>📋 [${fullDate}] 已確認紀錄 (*為請假)：</b>`;
    document.getElementById('uncheckTitle').innerHTML = `<b>✅ [${fullDate}] 待點名名單：</b>`;

    document.getElementById('uncheckList').innerHTML = "<p style='grid-column:span 2;text-align:center;'>讀取中...</p>";
    document.getElementById('checkedList').innerHTML = "<p style='grid-column:span 2;text-align:center;'>讀取中...</p>";
    
    const isLogged = localStorage.getItem("att_pwd_" + curClub) !== null;

    try {
      const [r1, r2] = await Promise.all([
        fetch(`${API_URL}?action=getStudents&clubName=${encodeURIComponent(curClub)}&date=${encodeURIComponent(fullDate)}&mode=unchecked`),
        fetch(`${API_URL}?action=getStudents&clubName=${encodeURIComponent(curClub)}&date=${encodeURIComponent(fullDate)}&mode=checked`)
      ]);
      renderList('uncheckList', await r1.json(), 'checkbox', isLogged);
      renderList('checkedList', await r2.json(), 'delete', isLogged);
    } catch(e) { showStatus("獲取數據失敗", "error"); }
  }

  function renderList(id, data, type, isLogged) {
    const container = document.getElementById(id);
    if (!data.length) {
      container.innerHTML = "<p style='grid-column:span 2;color:gray;text-align:center;font-size:14px;'>目前無紀錄</p>";
      return;
    }
    container.innerHTML = "";
    data.forEach(nameText => {
      let d = document.createElement('div'); d.className = "student-row";
      if(type === 'checkbox') {
        const ctrl = isLogged ? `<input type="checkbox" name="stu" value="${nameText}" style="transform:scale(1.3);">` : `<span>(唯讀)</span>`;
        d.innerHTML = `<span>${nameText}</span>${ctrl}`;
      } else {
        const cleanName = nameText.replace('*', '');
        const ctrl = isLogged ? `<button class="btn-outline-danger" onclick="deleteSingle('${cleanName}')">撤銷</button>` : '';
        d.innerHTML = `<span>${nameText}</span>${ctrl}`;
      }
      container.appendChild(d);
    });
  }

  async function callPost(data) {
    const pwd = localStorage.getItem("att_pwd_" + curClub);
    const fullDate = getFullDateKey();
    showStatus("同步至雲端系統...", "loading");
    try {
      const r = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({...data, clubName: curClub, password: pwd, date: fullDate})
      });
      const res = await r.json();
      if(res.status === 'success') {
        showStatus(res.message, "success");
        setTimeout(() => { clearStatus(); refreshLists(); }, 1000);
      } else {
        showStatus(res.message, "error");
      }
    } catch(e) { showStatus("系統連線錯誤", "error"); }
  }

  function submitMulti(act) {
    const box = document.querySelectorAll('input[name="stu"]:checked');
    if(!box.length) return alert("請先勾選學生姓名");
    const stuList = Array.from(box).map(b => b.value);
    callPost({ action: act, students: stuList });
  }

  function deleteSingle(name) {
    if(!confirm("確定要撤銷 " + name + " 的紀錄嗎？")) return;
    callPost({ action: 'deleteSingle', studentName: name });
  }

  function confirmDeleteAll() {
    if(confirm(`⚠️ 確定要刪除 [${getFullDateKey()}] 整欄紀錄嗎？`)) {
      callPost({ action: 'deleteAll' });
    }
  }

  function showStatus(msg, type) {
    const s = document.getElementById('status'); s.innerText = msg; s.className = "";
    if (type === "success") s.classList.add('msg-success');
    else if (type === "error") s.classList.add('msg-error');
    else s.classList.add('msg-loading');
  }

  function clearStatus() { document.getElementById('status').innerText = ""; document.getElementById('status').className = ""; }
</script>

</body>
</html>
